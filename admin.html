<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip 7 Scoreboard - Admin Control V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tối ưu hiển thị ô nhập điểm trên điện thoại */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body 
class="text-gray-100 min-h-screen bg-cover bg-center bg-fixed"
style="
background-image:
linear-gradient(
rgba(0,0,0,0.65),
rgba(0,0,0,0.65)
),
url('assets/background.jpg');
">

    <!-- Cửa sổ đăng nhập (Mã PIN) -->
    <div id="auth-gate" class="fixed inset-0 bg-gray-950 flex items-center justify-center z-50">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700 max-w-sm w-full mx-4">
            <h2 class="text-2xl font-bold text-yellow-500 mb-4 text-center">Admin Access</h2>
            <p class="text-gray-400 text-sm mb-4 text-center">Vui lòng nhập mật khẩu quản trị viên để chỉnh sửa điểm.</p>
            <input type="password" id="admin-password" placeholder="Nhập mã pin..." class="w-full p-3 bg-gray-900 border border-gray-600 rounded-lg text-center font-bold tracking-widest text-xl text-white mb-4 focus:outline-none focus:border-yellow-500">
            <button id="btn-login" class="w-full bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-3 rounded-lg transition-colors shadow-lg">Xác nhận</button>
            <p id="auth-error" class="text-red-500 text-sm mt-2 text-center hidden">Sai mã PIN rồi bạn ơi!</p>
        </div>
    </div>

    <!-- Bảng điều khiển Admin -->
    <div id="admin-panel" class="container mx-auto px-4 py-6 max-w-5xl hidden">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-gray-700 pb-4 mb-6 gap-4">
            <div>
                <h1 class="text-3xl font-black text-red-500 tracking-wide">ADMIN CONTROL V3</h1>
                <p class="text-sm text-gray-400">Cho phép click sửa trực tiếp bất kỳ vòng nào (V1, V2, V3...). Tự tính tổng điểm.</p>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <button id="btn-undo" class="flex-1 md:flex-initial bg-gray-700 hover:bg-gray-600 text-white font-medium py-2 px-4 rounded-lg shadow transition-all text-sm">↩️ Hoàn tác (Undo)</button>
                <button id="btn-reset" class="flex-1 md:flex-initial bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg shadow transition-all text-sm">🗑️ Trận mới (Reset)</button>
            </div>
        </div>

        <!-- Khung thêm người chơi -->
        <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 mb-6">
            <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Thêm người chơi mới</h3>
            <div class="flex gap-2">
                <input type="text" id="new-player-name" placeholder="Tên người chơi..." class="flex-1 p-2 bg-gray-900 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-red-500">
                <button id="btn-add-player" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-5 rounded-lg transition-colors">Thêm</button>
            </div>
        </div>

        <!-- Bảng Ma Trận Quản Lý Điểm Số -->
        <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden shadow-xl">
            <div class="p-4 bg-gray-750 border-b border-gray-700 flex justify-between items-center">
                <h3 class="font-bold text-gray-300">Tổng số vòng đấu hiện tại: <span id="current-round-text" class="text-yellow-400 text-xl">0</span></h3>
                <button id="btn-add-round" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-1.5 px-4 rounded-md text-sm transition-all">+ Thêm Vòng mới</button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse table-auto">
                    <thead>
                        <tr class="bg-gray-700 text-gray-300 text-xs uppercase tracking-wider" id="admin-table-header">
                            <!-- Sẽ render động qua JS: Người chơi | V1 | V2 | ... | Tổng -->
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-700 text-sm md:text-base" id="admin-table-body">
                        <tr>
                            <td colspan="3" class="text-center py-8 text-gray-400">Đang tải dữ liệu trận đấu...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Nút Lưu đồng bộ Firestore -->
            <div class="p-4 bg-gray-750 text-right border-t border-gray-700">
                <button id="btn-save" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-8 rounded-lg text-base shadow-lg transition-all w-full md:w-auto">💾 CẬP NHẬT ĐIỂM SỐ LÊN LIVE</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUTKQK4mUKMBc-f8cnu-JAEhQ5XHZeg-E",
            authDomain: "flip7live.firebaseapp.com",
            projectId: "flip7live",
            storageBucket: "flip7live.firebasestorage.app",
            messagingSenderId: "803983803794",
            appId: "1:803983803794:web:70bbe5349d3a63650ded4b",
            measurementId: "G-RNQKM7R0S6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "games", "main");

        let gameState = { rounds: 0, players: [] };
        let historyStack = [];

        const authGate = document.getElementById('auth-gate');
        const adminPanel = document.getElementById('admin-panel');
        const passwordInput = document.getElementById('admin-password');
        const loginBtn = document.getElementById('btn-login');
        const authError = document.getElementById('auth-error');

        // Đăng nhập bằng mã PIN
        loginBtn.addEventListener('click', () => {
            if (passwordInput.value === "2106") {
                authGate.classList.add('hidden');
                adminPanel.classList.remove('hidden');
                loadCurrentGameData();
            } else {
                authError.classList.remove('hidden');
            }
        });

        // Hỗ trợ ấn Enter để đăng nhập
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });

        // Tải dữ liệu từ Firestore lúc ban đầu
        async function loadCurrentGameData() {
            try {
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    gameState = docSnap.data();
                    // Chuẩn hóa cấu hình mảng scores nếu có lỗi thiếu hụt dữ liệu
                    gameState.players.forEach(p => {
                        while(p.scores.length < gameState.rounds) p.scores.push(0);
                    });
                } else {
                    gameState = { rounds: 1, players: [] };
                    await setDoc(docRef, gameState);
                }
                renderAdminView();
            } catch (error) {
                alert("Lỗi tải dữ liệu Firestore: " + error.message);
            }
        }

        // Lưu lịch sử phục vụ tính năng Undo
        function saveToHistory() {
            historyStack.push(JSON.stringify(gameState));
            if (historyStack.length > 10) historyStack.shift();
        }

        // Hàm thu thập toàn bộ dữ liệu đang nhập trên bảng đưa vào biến trạng thái gameState
        function collectAllInputs() {
            gameState.players.forEach((player, pIndex) => {
                for (let rIdx = 0; rIdx < gameState.rounds; rIdx++) {
                    const inputEl = document.getElementById(`score-${pIndex}-${rIdx}`);
                    if (inputEl) {
                        const val = parseInt(inputEl.value);
                        player.scores[rIdx] = isNaN(val) ? 0 : val;
                    }
                }
            });
        }

        // Hàm tự động tính toán lại tổng điểm lập tức hiển thị lên giao diện (Client-side)
        function recalculateTotals() {
            gameState.players.forEach((player, pIndex) => {
                let currentTotal = 0;
                for (let rIdx = 0; rIdx < gameState.rounds; rIdx++) {
                    const inputEl = document.getElementById(`score-${pIndex}-${rIdx}`);
                    if (inputEl) {
                        const val = parseInt(inputEl.value);
                        currentTotal += isNaN(val) ? 0 : val;
                    } else {
                        currentTotal += (player.scores[rIdx] || 0);
                    }
                }
                const totalCell = document.getElementById(`total-${pIndex}`);
                if (totalCell) totalCell.innerText = currentTotal;
            });
        }

        // Hàm dựng giao diện bảng điểm động ma trận hoàn chỉnh
        function renderAdminView() {
            document.getElementById('current-round-text').innerText = gameState.rounds;

            // 1. Render Header Bảng
            const headerRow = document.getElementById('admin-table-header');
            let headerHtml = `<th class="py-3 px-4 font-bold">Người chơi</th>`;
            for (let i = 1; i <= gameState.rounds; i++) {
                headerHtml += `<th class="py-3 px-2 text-center w-20">V${i}</th>`;
            }
            headerHtml += `<th class="py-3 px-4 text-right w-24">Tổng điểm</th>`;
            headerRow.innerHTML = headerHtml;

            // 2. Render Body Bảng (Mỗi ô điểm là một ô Input có thể chỉnh sửa tự do)
            const tbody = document.getElementById('admin-table-body');
            let bodyHtml = '';

            gameState.players.forEach((player, pIndex) => {
                const totalScore = player.scores.reduce((sum, s) => sum + (s || 0), 0);
                
                bodyHtml += `
                    <tr class="hover:bg-gray-750 transition-colors">
                        <td class="py-3 px-4 font-bold text-yellow-400 max-w-[150px] truncate">${player.name}</td>
                `;

                // Vòng lặp in ra toàn bộ các ô điểm Input theo số lượng vòng
                for (let rIdx = 0; rIdx < gameState.rounds; rIdx++) {
                    const scoreVal = player.scores[rIdx] !== undefined ? player.scores[rIdx] : '';
                    bodyHtml += `
                        <td class="py-2 px-1">
                            <input type="number" 
                                   id="score-${pIndex}-${rIdx}" 
                                   value="${scoreVal}" 
                                   placeholder="0" 
                                   class="score-input-v3 w-full p-2 bg-gray-900 border border-gray-700 rounded text-center font-bold text-base text-emerald-400 focus:outline-none focus:border-red-500 transition-colors">
                        </td>
                    `;
                }

                bodyHtml += `
                        <td class="py-3 px-4 text-right font-black text-xl text-yellow-500" id="total-${pIndex}">${totalScore}</td>
                    </tr>
                `;
            });

            tbody.innerHTML = bodyHtml || `<tr><td colspan="3" class="text-center py-8 text-gray-400">Chưa có người chơi. Hãy thêm người chơi ở khung phía trên!</td></tr>`;

            // Lắng nghe sự kiện gõ số thay đổi để lập tức cập nhật lại cột Tổng điểm động
            const inputs = document.querySelectorAll('.score-input-v3');
            inputs.forEach(input => {
                input.addEventListener('input', recalculateTotals);
            });
        }

        // Tính năng: Thêm người chơi mới
        document.getElementById('btn-add-player').addEventListener('click', () => {
            const nameInput = document.getElementById('new-player-name');
            const name = nameInput.value.trim();
            if (!name) return;

            saveToHistory();
            collectAllInputs(); // Đóng gói dữ liệu hiện tại trước khi thêm mới

            const emptyScores = Array(gameState.rounds).fill(0);
            gameState.players.push({ name: name, scores: emptyScores });
            nameInput.value = '';
            renderAdminView();
        });

        // Tính năng: Thêm Vòng mới (+1 cột dữ liệu vào bảng ma trận)
        document.getElementById('btn-add-round').addEventListener('click', () => {
            saveToHistory();
            collectAllInputs();

            gameState.rounds += 1;
            gameState.players.forEach(p => {
                p.scores.push(0); // Chèn thêm ô điểm 0 mặc định cho vòng mới
            });
            renderAdminView();
        });

        // Tính năng cốt lõi: Đẩy toàn bộ ma trận dữ liệu lên Firestore Realtime
        document.getElementById('btn-save').addEventListener('click', async () => {
            collectAllInputs();
            try {
                await setDoc(docRef, gameState);
                alert("🚀 Tuyệt vời! Toàn bộ bảng điểm các vòng đã được đồng bộ hóa lên Live thành công.");
            } catch (error) {
                alert("Lỗi đồng bộ Firestore: " + error.message);
            }
        });

        // Tính năng: Hoàn tác hành động lỗi (Undo)
        document.getElementById('btn-undo').addEventListener('click', () => {
            if (historyStack.length > 0) {
                gameState = JSON.parse(historyStack.pop());
                renderAdminView();
            } else {
                alert("Không còn thao tác nào trong bộ nhớ đệm để hoàn tác!");
            }
        });

        // Tính năng: Khởi động Game mới hoàn toàn (Reset trận đấu)
        document.getElementById('btn-reset').addEventListener('click', async () => {
            if (confirm("Cảnh báo: Bạn có chắc chắn muốn xóa sạch trận đấu hiện tại để tạo một Game mới không?")) {
                gameState = { rounds: 1, players: [] };
                historyStack = [];
                try {
                    await setDoc(docRef, gameState);
                    renderAdminView();
                    alert("Đã thiết lập Game mới hoàn toàn!");
                } catch (error) {
                    alert("Lỗi khi reset trận đấu: " + error.message);
                }
            }
        });
    </script>
</body>
</html>
